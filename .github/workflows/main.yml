name: Auto Post

on:
  schedule:
    - cron: '0 */3 * * *'   # har 3 ghante me 1 post
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install requests

      - name: Run script
        run: python main.py
